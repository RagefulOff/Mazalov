{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
    <h1>{{ title }}</h1>
    
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <form method="post" action="{{ post_url }}">
        {% for field in fields %}
            <p>
                <label><strong>{{ field.label }}:</strong></label><br>
                
                {% if field.type == 'select' %}
                    <select name="{{ field.name }}" {% if field.required %}required{% endif %}>
                        <option value="">-- Выберите значение --</option>
                        {% for opt in field.options %}
                            <option value="{{ opt.id }}">{{ opt.name }}</option>
                        {% endfor %}
                    </select>
                
                {% elif field.type == 'checkbox' %}
                    <input type="checkbox" name="{{ field.name }}" value="1">
                
                {% else %}
                    <input type="{{ field.type }}" name="{{ field.name }}" {% if field.required %}required{% endif %} step="any">
                {% endif %}
            </p>
        {% endfor %}
        
        <br>
        <button type="submit">Создать</button>
        <a href="{{ back_url }}" style="margin-left: 15px;">Отмена</a>
    </form>
{% endblock %}
